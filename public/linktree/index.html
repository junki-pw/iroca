<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <base href="/linktree/" />
  <title>iroca｜アイラッシュサロン</title>

  <meta name="description" content="忙しい毎日に、さりげない華やかさを。美容室併設・同日施術OKのアイラッシュサロン iroca。LINE予約・Instagram・アクセス情報はこちらから。" />
  <meta name="theme-color" content="#fdf7ed" />

  <!-- OGP / SNS シェア用 -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="iroca｜アイラッシュサロン" />
  <meta property="og:description" content="忙しい毎日に、さりげない華やかさを。" />
  <meta name="twitter:card" content="summary" />

  <!-- favicon（ブランドカラーのダイヤモンド） -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20width='32'%20height='32'%20rx='7'%20fill='%23735433'/%3E%3Crect%20x='11'%20y='11'%20width='10'%20height='10'%20rx='1.5'%20fill='%23fdf7ed'%20transform='rotate(45%2016%2016)'/%3E%3C/svg%3E" />

  <!-- Webフォント -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Noto+Serif+JP:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/linktree/style.css" />
</head>
<body>
  <main class="card">

    <!-- ===== ヒーロー（ロゴ・キャッチコピー・バッジ） ===== -->
    <header class="hero">
      <div class="hero__title">
        <p class="eyebrow">
          <span class="eyebrow__rule eyebrow__rule--left" aria-hidden="true"></span>
          <span class="eyebrow__diamond" aria-hidden="true"></span>
          <span class="eyebrow__text">EYELASH SALON</span>
          <span class="eyebrow__diamond" aria-hidden="true"></span>
          <span class="eyebrow__rule eyebrow__rule--right" aria-hidden="true"></span>
        </p>

        <h1 class="logo">iroca</h1>

        <p class="tagline">忙しい毎日に、さりげない華やかさを。</p>
      </div>

      <ul class="badges">
        <li class="badge">美容室併設</li>
        <li class="badge">同日施術OK</li>
      </ul>
    </header>

    <!-- ===== リンク一覧 ===== -->
    <nav class="links" aria-label="予約・SNS・アクセス">
      <ul class="links__list">

        <!-- LINE -->
        <li>
          <a class="link" href="https://lin.ee/tkUdZZb" target="_blank" rel="noopener noreferrer">
            <span class="link__icon">
              <img src="/linktree/assets/line.png" alt="" width="26" height="26" loading="lazy" />
            </span>
            <span class="link__body">
              <span class="link__title">LINE で予約・お問い合わせ</span>
              <span class="link__sub">LINE RESERVE</span>
            </span>
            <span class="link__chevron" aria-hidden="true"></span>
          </a>
        </li>

        <!-- Instagram -->
        <li>
          <a class="link" href="https://www.instagram.com/shokochaneyelash?igsh=Z2xoMjZrOGw2cXN0" target="_blank" rel="noopener noreferrer">
            <span class="link__icon">
              <img src="/linktree/assets/instagram.jpg" alt="" width="26" height="26" loading="lazy" />
            </span>
            <span class="link__body">
              <span class="link__title">Instagram を見る</span>
              <span class="link__sub">Instagram</span>
            </span>
            <span class="link__chevron" aria-hidden="true"></span>
          </a>
        </li>

        <!-- Hot Pepper Beauty ※リンク先未公開のため「準備中」表示。
             URL が決まったら、この <button> を
               <a class="link" href="（URL）" target="_blank" rel="noopener noreferrer">
             に戻し、.link__badge / .link__note / data-soon を削除、
             代わりに <span class="link__chevron" aria-hidden="true"></span> を追加してください。 -->
        <li>
          <button class="link link--soon" type="button" data-soon data-todo="hot-pepper-url"
                  aria-controls="soon-note" aria-expanded="false">
            <span class="link__icon">
              <img src="/linktree/assets/hotpepper.jpg" alt="" width="26" height="26" loading="lazy" />
            </span>
            <span class="link__body">
              <span class="link__title">Hot Pepper Beauty で予約</span>
              <span class="link__sub">Hot Pepper Beauty</span>
            </span>
            <span class="link__badge">準備中</span>
          </button>
          <p class="link__note" id="soon-note" hidden>
            近日公開予定です。お急ぎの方は、いまのところ
            <a href="https://lin.ee/tkUdZZb" target="_blank" rel="noopener noreferrer">LINE</a>
            からご予約いただけます。
          </p>
        </li>

        <!-- アクセス・地図（Googleマップ：埼玉県加須市三保1-32-3） -->
        <li>
          <a class="link" href="https://www.google.com/maps/search/?api=1&amp;query=%E5%9F%BC%E7%8E%89%E7%9C%8C%E5%8A%A0%E9%A0%88%E5%B8%82%E4%B8%89%E4%BF%9D1-32-3" target="_blank" rel="noopener noreferrer">
            <span class="link__icon">
              <svg class="link__pin" viewBox="0 0 14 20" fill="currentColor" aria-hidden="true">
                <path d="M7 0C3.13 0 0 3.13 0 7C0 12.25 7 20 7 20C7 20 14 12.25 14 7C14 3.13 10.87 0 7 0ZM2 7C2 4.24 4.24 2 7 2C9.76 2 12 4.24 12 7C12 9.88 9.12 14.19 7 16.88C4.92 14.21 2 9.85 2 7Z" />
                <path d="M7 9.5C8.38071 9.5 9.5 8.38071 9.5 7C9.5 5.61929 8.38071 4.5 7 4.5C5.61929 4.5 4.5 5.61929 4.5 7C4.5 8.38071 5.61929 9.5 7 9.5Z" />
              </svg>
            </span>
            <span class="link__body">
              <span class="link__title">アクセス・地図</span>
              <span class="link__sub">ACCESS・MAP</span>
            </span>
            <span class="link__chevron" aria-hidden="true"></span>
          </a>
        </li>

      </ul>
    </nav>

  </main>

  <!-- 「準備中」ボタンのタップで案内を開閉。
       JS が無い環境でも「準備中」バッジで状態は伝わります（崩れません）。 -->
  <script>
    (function () {
      var btn = document.querySelector('[data-soon]');
      if (!btn) return;
      var note = document.getElementById(btn.getAttribute('aria-controls'));
      if (!note) return;
      btn.addEventListener('click', function () {
        var willOpen = note.hasAttribute('hidden');
        note.toggleAttribute('hidden', !willOpen);
        btn.setAttribute('aria-expanded', String(willOpen));
      });
    })();
  </script>
</body>
</html>
