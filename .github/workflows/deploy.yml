name: Deploy to Cloudflare

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify live site
        run: |
          sleep 8
          check() {
            local url="$1"
            local code
            code=$(curl -sL -o /tmp/page.html -w "%{http_code}" "$url")
            echo "$url => HTTP $code"
            test "$code" = "200"
          }
          check "https://kyon-sen.com/linktree"
          check "https://kyon-sen.com/linktree/"
          grep -q "iroca" /tmp/page.html
          curl -sL "https://kyon-sen.com/linktree/style.css" | grep -q "iroca"
          MOBILE_UA="Mozilla/5.0 (iPhone; CPU iPhone OS 17_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.0 Mobile/15E148 Safari/604.1"
          code=$(curl -sL -A "$MOBILE_UA" -o /tmp/mobile.html -w "%{http_code}" "https://kyon-sen.com/linktree/")
          echo "mobile UA https://kyon-sen.com/linktree/ => HTTP $code"
          test "$code" = "200"
          grep -q "iroca" /tmp/mobile.html
          echo "Live verification passed"
